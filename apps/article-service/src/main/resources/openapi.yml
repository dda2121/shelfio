openapi: 3.1.0

info:
  title: Article API
  description: Provides basic operations to manage articles and groups
  version: 0.0.1

servers:
  - url: http://localhost:8081/api/v1/
    description: Local development server

security:
  - bearerAuth: [ ]

paths:
  "/groups":
    post:
      summary: Create a new group
      description: Creates a new group with the provided name
      tags:
        - group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupCreateRequest'
      responses:
        '201':
          description: Group created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupCreateResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      summary: Get all groups
      description: Retrieves a list of all groups with their IDs and names
      tags:
        - group
      responses:
        '200':
          description: A list of groups retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GroupPreviewResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  "/groups/{groupId}":
    get:
      summary: Get group details
      description: Retrieves detailed information about a specific group, including its articles
      tags:
        - group
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: The unique identifier of the group to retrieve
      responses:
        '200':
          description: Group details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupDetailResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Group not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      summary: Update group details
      description: Updates the name and associated articles of a specific group
      tags:
        - group
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: The unique identifier of the group to update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGroupRequest'
      responses:
        '200':
          description: Group updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupDetailResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Group not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'


  "/articles":
    post:
      summary: Create a new article
      description: Creates a new article with the provided name, URI, and optional group ID
      tags:
        - article
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArticleCreateRequest'
      responses:
        '201':
          description: Article created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleCreateResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      summary: Get all articles
      description: Retrieves a list of all articles with their IDs, names, URIs, and group information
      tags:
        - article
      responses:
        '200':
          description: A list of articles retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ArticlePreviewResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  "/articles/{articleId}":
    get:
      summary: Get article details
      description: Retrieves detailed information about a specific article, including its group information and notes
      tags:
        - article
      parameters:
        - name: articleId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: The unique identifier of the article to retrieve
      responses:
        '200':
          description: Article details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleDetailResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Article not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      summary: Update article details
      description: Updates the name, URI, group association, and notes of a specific article
      tags:
        - article
      parameters:
        - name: articleId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: The unique identifier of the article to update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateArticleRequest'
      responses:
        '200':
          description: Article updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleDetailResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Article not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'


components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ### --------- COMMON SCHEMAS --------- ###
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          description: A descriptive error message
      required:
        - message

    ### --------- GROUP SCHEMAS --------- ###
    GroupCreateRequest:
      type: object
      properties:
        name:
          type: string
          description: The name of the group
      required:
        - name

    GroupCreateResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: The unique identifier of the created group
        name:
          type: string
          description: The name of the created group
      required:
        - id
        - name

    GroupPreviewResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: The unique identifier of the group
        name:
          type: string
          description: The name of the group
      required:
        - id
        - name

    GroupDetailResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: The unique identifier of the group
        name:
          type: string
          description: The name of the group
        createdAt:
          type: string
          format: date-time
          description: The timestamp when the group was created
        modifiedAt:
          type: string
          format: date-time
          description: The timestamp when the group was last modified
        articles:
          type: array
          items:
            $ref: '#/components/schemas/ArticlePreviewResponse'
      required:
        - id
        - name
        - createdAt
        - modifiedAt
        - articles

    UpdateGroupRequest:
      type: object
      properties:
        name:
          type: string
          description: The new name of the group
        articleIds:
          type: array
          items:
            type: integer
            format: int64
          description: A list of article IDs to be associated with the group
      required:
        - name
        - articleIds

    ### --------- ARTICLE SCHEMAS --------- ###
    ArticleCreateRequest:
      type: object
      properties:
        name:
          type: string
          description: The name of the article
        uri:
          type: string
          description: The URI of the article
        groupId:
          type: integer
          format: int64
          nullable: true
      required:
        - name
        - uri
        - groupId

    ArticleCreateResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: The unique identifier of the created article
        name:
          type: string
          description: The name of the created article
        uri:
          type: string
          description: The URI of the created article
        groupId:
          type: integer
          format: int64
          description: The ID of the group to which the article belongs
          nullable: true
        createdAt:
          type: string
          format: date-time
          description: The timestamp when the article was created
        modifiedAt:
          type: string
          format: date-time
          description: The timestamp when the article was last modified
      required:
        - id
        - name
        - uri
        - createdAt
        - modifiedAt

    ArticlePreviewResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: The unique identifier of the article
        name:
          type: string
          description: The name of the article
        uri:
          type: string
          description: The URI of the article
        groupId:
          type: integer
          format: int64
          description: The ID of the group to which the article belongs
          nullable: true
        groupName:
          type: string
          description: The name of the group to which the article belongs
          nullable: true
      required:
        - id
        - name
        - uri
        - groupId
        - groupName

    ArticleDetailResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: The unique identifier of the article
        name:
          type: string
          description: The name of the article
        uri:
          type: string
          description: The URI of the article
        groupId:
          type: integer
          format: int64
          description: The ID of the group to which the article belongs
          nullable: true
        groupName:
          type: string
          description: The name of the group to which the article belongs
          nullable: true
        createdAt:
          type: string
          format: date-time
          description: The timestamp when the article was created
        modifiedAt:
          type: string
          format: date-time
          description: The timestamp when the article was last modified
        notes:
          type: string
          description: Additional notes or comments about the article (in future will support markdown formatting)
      required:
        - id
        - name
        - uri
        - groupId
        - groupName
        - createdAt
        - modifiedAt
        - notes

    UpdateArticleRequest:
      type: object
      properties:
        name:
          type: string
          description: The new name of the article
        uri:
          type: string
          description: The new URI of the article
        groupId:
          type: integer
          format: int64
          description: The new group ID to which the article should belong
          nullable: true
        notes:
          type: string
          description: Additional notes or comments about the article (in future will support markdown formatting)
      required:
        - name
        - uri
        - groupId
        - notes